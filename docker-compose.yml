name: mjira

services:
  gateway:
    build: ./gateway
    ports:
      - "8080:80"
    depends_on:
      - auth
      - tenant
      - projects
      - issues
      - notifications
      - audit
      - redis

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/auth_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      TENANT_SERVICE_URL: http://tenant:8000
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SERVICE_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started

  tenant:
    build:
      context: .
      dockerfile: services/tenant/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/tenant_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SERVICE_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started

  projects:
    build:
      context: .
      dockerfile: services/projects/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/projects_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SERVICE_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started

  issues:
    build:
      context: .
      dockerfile: services/issues/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/issues_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SERVICE_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started

  notifications:
    build:
      context: .
      dockerfile: services/notifications/Dockerfile
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: ${SMTP_FROM}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SERVICE_PORT: 8000
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
      jaeger:
        condition: service_started

  audit:
    build:
      context: .
      dockerfile: services/audit/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/audit_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      SERVICE_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # web UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
