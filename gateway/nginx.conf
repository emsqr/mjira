upstream auth_upstream     { server auth:8000; }
upstream tenant_upstream   { server tenant:8000; }
upstream projects_upstream { server projects:8000; }
upstream issues_upstream   { server issues:8000; }

server {
    listen 80;
    server_name _;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # /internal/* must NEVER be exposed publicly
    location /internal { return 404; }

    location /auth {
        proxy_pass http://auth_upstream;
    }

    location /tenants {
        proxy_pass http://tenant_upstream;
    }

    location /projects {
        proxy_pass http://projects_upstream;
    }

    location /issues {
        proxy_pass http://issues_upstream;
    }
}
