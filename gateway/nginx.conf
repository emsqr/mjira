# Re-resolve service DNS at runtime via Docker's embedded resolver. Without
# this, nginx caches the upstream IP from container startup and returns 404
# after a `docker compose up --build` recreates services with new IPs.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # /internal/* must NEVER be exposed publicly
    location /internal { return 404; }

    location /auth {
        set $upstream auth;
        proxy_pass http://$upstream:8000;
    }

    location /tenants {
        set $upstream tenant;
        proxy_pass http://$upstream:8000;
    }

    location /projects {
        set $upstream projects;
        proxy_pass http://$upstream:8000;
    }

    location /issues {
        set $upstream issues;
        proxy_pass http://$upstream:8000;
    }

    location /notifications {
        set $upstream notifications;
        proxy_pass http://$upstream:8000;
    }

    location /audit {
        set $upstream audit;
        proxy_pass http://$upstream:8000;
    }
}
